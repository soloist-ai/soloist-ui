openapi: 3.0.3
info:
  title: Soloist gateway openapi
  version: 1.0.0

paths:
  # =============== AUTHENTICATION ===============
  /api/auth/login:
    post:
      tags:
        - auth
      operationId: login
      summary: Authenticate using Telegram Web App data
      description: Authenticates the user using Telegram Web App data and returns JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid Telegram data or signature
        '400':
          description: Bad request

  /api/auth/refresh:
    post:
      tags:
        - auth
      operationId: refresh
      summary: Refresh access token using refresh token
      description: Generates a new access token using a valid refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid or expired refresh token
        '400':
          description: Bad request

components:
  schemas:
    # --- REQUESTS ---
    LoginRequest:
      $ref: '#/components/schemas/TgAuthData'

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: The refresh token to use for generating a new access token
      description: Request body for refreshing the access token

    # --- RESPONSES ---
    LoginResponse:
      type: object
      properties:
        accessToken:
          $ref: '#/components/schemas/JwtToken'
        refreshToken:
          $ref: '#/components/schemas/JwtToken'
      required:
        - accessToken
        - refreshToken

    RefreshResponse:
      type: object
      properties:
        accessToken:
          $ref: '#/components/schemas/JwtToken'
      required:
        - accessToken

    JwtToken:
      type: object
      properties:
        token:
          type: string
          description: JWT token string
        expiration:
          type: string
          format: date-time
          description: Expiration time of the token
        type:
          $ref: '#/components/schemas/JwtTokenType'
      required:
        - token
        - expiration
        - type

    TgUserData:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        photo_url:
          type: string
        language_code:
          type: string
        added_to_attachment_menu:
          type: boolean
        allows_write_to_pm:
          type: boolean
        is_bot:
          type: boolean
        is_premium:
          type: boolean
      required:
        - id

    TgWebAppData:
      type: object
      properties:
        query_id:
          type: string
        user:
          $ref: '#/components/schemas/TgUserData'
        receiver:
          $ref: '#/components/schemas/TgUserData'
        chat:
          $ref: '#/components/schemas/TgWebAppChat'
        chat_type:
          type: string
        chat_instance:
          type: string
        start_param:
          type: string
        can_send_after:
          type: integer
        auth_date:
          type: string
          format: date-time
        hash:
          type: string
          description: Signature hash of the data
        signature:
          type: string
      required:
        - auth_date
        - hash
        - user

    TgAuthData:
      type: object
      properties:
        tg_web_app_data:
          $ref: '#/components/schemas/TgWebAppData'
        init_data:
          type: string
          description: Raw init data string from Telegram Web App
      required:
        - tg_web_app_data
        - init_data

    TgWebAppChat:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        username:
          type: string
        photo_url:
          type: string

    Message:
      type: object
      properties:
        payload:
          $ref: '#/components/schemas/Notification'
        timestamp:
          type: string
          format: date-time
      required:
        - payload
        - timestamp

    Notification:
      type: object
      properties:
        message:
          type: string
        type:
          $ref: '#/components/schemas/NotificationType'
        source:
          $ref: '#/components/schemas/NotificationSource'
      required:
        - type
        - source

    NotificationType:
      type: string
      enum: [ info, warning, error ]

    NotificationSource:
      type: string
      enum: [ tasks, locale, dayStreak ]
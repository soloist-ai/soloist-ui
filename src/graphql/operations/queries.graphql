# ── Bootstrap ────────────────────────────────────────────────────────────────
# Only what was previously in getUserAdditionalInfo: identity + locale + dayStreak
query GetAppData {
  me {
    id
    photoUrl
    locale {
      tag
      isManual
    }
    roles
    player {
      dayStreak {
        ...DayStreakFields
      }
    }
  }
}

# ── Targeted refreshes after WS notifications ────────────────────────────────

query RefreshActiveTasks {
  me {
    player {
      activeTasks {
        isFirstTime
        tasks {
          ...PlayerTaskFields
        }
      }
      stamina {
        ...StaminaFields
      }
    }
  }
}

query RefreshDayStreak {
  me {
    player {
      dayStreak {
        ...DayStreakFields
      }
    }
  }
}

# ── Per-tab on-demand queries ─────────────────────────────────────────────────

# ProfileTab — fresh fetch on open
query GetUserProfile {
  me {
    id
    username
    firstName
    lastName
    photoUrl
    roles
    locale {
      tag
      isManual
    }
    player {
      id
      agility
      strength
      intelligence
      level {
        ...LevelFields
      }
    }
  }
}

# TopicsSection — own fetch on mount
query GetPlayerTopics {
  me {
    player {
      taskTopics {
        topics {
          ...PlayerTaskTopicFields
        }
      }
    }
  }
}

# BalanceTab — first request: balance amount + first page of transactions together
query GetBalanceWithTransactions($paging: PagingInput!, $options: SearchOptionsInput) {
  me {
    player {
      balance {
        id
        amount {
          ...MoneyFields
        }
        transactions(paging: $paging, options: $options) {
          transactions {
            id
            amount {
              ...MoneyFields
            }
            type
            cause
            createdAt
          }
          paging {
            ...ResponsePagingFields
          }
        }
      }
    }
  }
}

# LeaderboardView — first request: users list + current user position together
query GetLeaderboardInitial($paging: PagingInput!, $filter: LeaderboardFilterInput!) {
  usersLeaderboard(paging: $paging, filter: $filter) {
    users {
      id
      firstName
      lastName
      photoUrl
      score
      position
    }
    paging {
      ...ResponsePagingFields
    }
  }
  userLeaderboard(filter: $filter) {
    id
    firstName
    lastName
    photoUrl
    score
    position
  }
}

# ── Other user profile ────────────────────────────────────────────────────────

query GetUserById($id: Long!) {
  user(id: $id) {
    id
    username
    firstName
    lastName
    photoUrl
    locale {
      tag
      isManual
    }
    roles
    player {
      id
      agility
      strength
      intelligence
      level {
        ...LevelFields
      }
      balance {
        id
        amount {
          ...MoneyFields
        }
      }
    }
  }
}

query GetMonthlyActivity($year: Int!, $month: Int!) {
  me {
    player {
      monthlyActivity(year: $year, month: $month) {
        activeDays
      }
    }
  }
}

query GetDailyTasks {
  me {
    player {
      dailyTasks {
        tasks {
          id
          title
          progress
          goal
          isCompleted
        }
      }
    }
  }
}

# ── Paginated queries — only list fields, no extra data ──────────────────────

query GetBalanceTransactions($paging: PagingInput!, $options: SearchOptionsInput) {
  me {
    player {
      balance {
        transactions(paging: $paging, options: $options) {
          transactions {
            id
            amount {
              ...MoneyFields
            }
            type
            cause
            createdAt
          }
          paging {
            ...ResponsePagingFields
          }
        }
      }
    }
  }
}

query GetClosedTasks($paging: PagingInput!, $options: SearchOptionsInput) {
  me {
    player {
      closedTasks(paging: $paging, options: $options) {
        tasks {
          ...PlayerTaskFields
        }
        paging {
          ...ResponsePagingFields
        }
      }
    }
  }
}

# Pagination-only — used for subsequent pages in LeaderboardView
query GetUsersLeaderboard($paging: PagingInput!, $filter: LeaderboardFilterInput!) {
  usersLeaderboard(paging: $paging, filter: $filter) {
    users {
      id
      firstName
      lastName
      photoUrl
      score
      position
    }
    paging {
      ...ResponsePagingFields
    }
  }
}
